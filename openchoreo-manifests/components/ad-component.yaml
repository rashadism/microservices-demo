apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: ad
  namespace: default
spec:
  owner:
    projectName: gcp-microservice-demo

  autoDeploy: true
  componentType: deployment/service

  parameters:
    replicas: 1
    port: 9555
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

---

apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: ad
  namespace: default
spec:
  owner:
    componentName: ad
    projectName: gcp-microservice-demo
  containers:
    main:
      image: rashadxyz/adservice:v3
      env:
        - key: PORT
          value: "9555"
        - key: OTEL_SERVICE_NAME
          value: "adservice"
        - key: OTEL_TRACES_EXPORTER
          value: "otlp"
        - key: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - key: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://opentelemetry-collector.openchoreo-observability-plane.svc.cluster.local:4317"
